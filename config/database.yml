default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  username: <%= ENV["DEV_USERNAME"] %>
  host: <%= ENV["DEV_HOST"] %>
  password: <%= ENV["DEV_PASSWORD"] %>
  port: <%= ENV["DEV_PORT"] %>
  database: financial_manager_development

test:
  <<: *default
  username: <%= ENV["TEST_USERNAME"] %>
  host: <%= ENV["TEST_HOST"] %>
  password: <%= ENV["TEST_PASSWORD"] %>
  port: <%= ENV["TEST_PORT"] %>
  database: financial_manager_test

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate

  queue:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate

  cable:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate